name: Deploy Spring Boot App

on:
  push:
    branches:
      - main

permissions:
  contents: read
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: projects/515371922948/locations/global/workloadIdentityPools/github-pool/providers/github-provider
          service_account: github-actions@employee-rbac.iam.gserviceaccount.com

      - name: Setup Google Cloud SDK
        uses: google-github-actions/setup-gcloud@v3

      - name: Install GKE auth plugin
        run: |
          gcloud components install gke-gcloud-auth-plugin --quiet

      - name: Enable GKE auth plugin
        run: |
          echo "USE_GKE_GCLOUD_AUTH_PLUGIN=True" >> $GITHUB_ENV

      - name: Resolve project directory
        id: project-dir
        shell: bash
        run: |
          if [ -f pom.xml ]; then
            PROJECT_DIR="$GITHUB_WORKSPACE"
          elif [ -f CRUD/pom.xml ]; then
            PROJECT_DIR="$GITHUB_WORKSPACE/CRUD"
          else
            echo "Could not find pom.xml in the repository root or under CRUD/"
            exit 1
          fi
          echo "project_dir=$PROJECT_DIR" >> "$GITHUB_OUTPUT"

      - name: Build Spring Boot App
        shell: bash
        run: |
          cd "${{ steps.project-dir.outputs.project_dir }}"
          ./mvnw clean package -DskipTests

      - name: Configure Docker Authentication
        run: gcloud auth configure-docker us-central1-docker.pkg.dev

      - name: Build Docker Image
        shell: bash
        run: |
          cd "${{ steps.project-dir.outputs.project_dir }}"
          docker build -t us-central1-docker.pkg.dev/employee-rbac/springboot-repo/employee-api:${{ github.sha }} .

      - name: Push Docker Image
        run: |
          docker push us-central1-docker.pkg.dev/employee-rbac/springboot-repo/employee-api:${{ github.sha }}

      - name: Get GKE Credentials
        run: |
          gcloud container clusters get-credentials employee-cluster \
            --zone us-central1-a \
            --project employee-rbac

      - name: Deploy to GKE
        shell: bash
        run: |
          cd "${{ steps.project-dir.outputs.project_dir }}"
          kubectl apply -f K8s/
          kubectl set image deployment/employee-api \
            employee-api=us-central1-docker.pkg.dev/employee-rbac/springboot-repo/employee-api:${{ github.sha }}