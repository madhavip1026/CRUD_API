name: Deploy to GKE

on:

  push:

    branches:

      - main

jobs:

  deploy:

    runs-on: ubuntu-latest

    steps:

      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4

        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Build

        run: mvn clean package

      - name: Docker Build

        run: |
          docker build -t employee-api .

      - name: Authenticate GCP

        uses: google-github-actions/auth@v2

      - name: Configure Docker

        run: gcloud auth configure-docker us-central1-docker.pkg.dev

      - name: Push Image

        run: |
          docker tag employee-api us-central1-docker.pkg.dev/PROJECT_ID/springboot-repo/employee-api:${{ github.sha }}

          docker push us-central1-docker.pkg.dev/PROJECT_ID/springboot-repo/employee-api:${{ github.sha }}

      - name: Deploy to GKE

        run: |
          kubectl set image deployment/employee-api \
          employee-api=us-central1-docker.pkg.dev/PROJECT_ID/springboot-repo/employee-api:${{ github.sha }}